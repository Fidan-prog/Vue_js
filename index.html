<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hello-vue" class="demo">
        {{ message }}
    </div>

    <div id="counter" class="demo">
        Счетчик:{{ counter }}
    </div>

    <div id="bind-attribute" class="demo">
        <span v-bind:title="mes">
            Наведи на меня курсор на пару секунд, чтобы 
            увидеть динамически связанное значения title!
        </span>
    </div>

    <!-- PR2 -->
    <div id="event-handling">
        <p>{{ message }}</p>
        <button v-on:click="reverseMessage">
            Перевернуть сообщение
        </button>
    </div>
    <div id="two-way-binding">
        <p>{{ message }}</p>
        <input v-model="message">
    </div>

    <div id="counditional-rendering">
        <span v-if="seen">
            Сейчас меня видно
        </span>
    </div>

    <div id="list-rendering">
        <ol>
            <li v-for="todo in todos">
                {{ todo.text }}, мой уровень {{ todo.level }}
            </li>
        </ol>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script src="js/main.js"></script>

</body>
</html>
